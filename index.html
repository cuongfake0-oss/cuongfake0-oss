<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Learning - Nhóm 9</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 550px;
            text-align: center;
        }
        .group-tag { color: var(--primary); font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            resize: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); }
        .lang-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .lang-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-play { background: var(--success); color: white; grid-column: span 2; font-size: 16px; }
        .btn-switch { background: var(--primary); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 14px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="group-tag">🎙️ NHÓM 9 - AI TEXT TO SPEECH</div>
    <textarea id="text-input" placeholder="Nhập nội dung bài học tại đây..."></textarea>

    <div class="lang-box">
        <span>Đang chọn:</span>
        <span class="lang-badge" id="lang-label">Tiếng Việt (vi-VN)</span>
    </div>

    <div class="controls">
        <button class="btn-play" onclick="speak()">▶ PHÁT ÂM THANH</button>
        <button class="btn-switch" onclick="toggleLanguage()">🔄 ĐỔI NGÔN NGỮ</button>
        <button class="btn-stop" onclick="stop()">⏹ DỪNG</button>
    </div>

    <div id="status">Trạng thái: Sẵn sàng</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let currentLang = 'vi-VN';

    function toggleLanguage() {
        if (currentLang === 'vi-VN') {
            currentLang = 'en-US';
            document.getElementById('lang-label').innerText = "Tiếng Anh (en-US)";
            document.getElementById('lang-label').style.background = "#555";
        } else {
            currentLang = 'vi-VN';
            document.getElementById('lang-label').innerText = "Tiếng Việt (vi-VN)";
            document.getElementById('lang-label').style.background = "#4a90e2";
        }
        document.getElementById('status').innerText = "Đã đổi sang " + (currentLang === 'vi-VN' ? "Tiếng Việt" : "Tiếng Anh");
    }

    function speak() {
        const text = document.getElementById('text-input').value;
        if (!text.trim()) return alert("Vui lòng nhập văn bản!");

        synth.cancel(); // Dừng các lượt nói cũ

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = currentLang;
        utter.rate = 1.0;

        // Tự động tìm giọng đọc phù hợp trong máy tính/điện thoại
        const voices = synth.getVoices();
        const voice = voices.find(v => v.lang.startsWith(currentLang.split('-')[0]));
        if (voice) utter.voice = voice;

        utter.onstart = () => document.getElementById('status').innerText = "Trạng thái: Đang phát...";
        utter.onend = () => document.getElementById('status').innerText = "Trạng thái: Đã hoàn thành.";

        synth.speak(utter);
    }

    function stop() {
        synth.cancel();
        document.getElementById('status').innerText = "Trạng thái: Đã dừng.";
    }

    // Fix lỗi một số trình duyệt không tải giọng nói ngay lập tức
    window.speechSynthesis.onvoiceschanged = () => { synth.getVoices(); };
</script>

</body>
</html>
