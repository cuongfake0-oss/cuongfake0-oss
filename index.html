<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Learning - Nhóm 9</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 550px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 5px; }
        .group-tag { color: var(--primary); font-weight: bold; margin-bottom: 25px; }
        
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            resize: none;
            transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary); }

        .lang-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .lang-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        .btn-play { background: var(--success); color: white; grid-column: span 2; }
        .btn-switch { background: var(--primary); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        #status { margin-top: 20px; font-size: 14px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ AI Voice Reader</h1>
    <div class="group-tag">DỰ ÁN NHÓM 9</div>

    <textarea id="text-input" placeholder="Nhập nội dung bài học cần đọc..."></textarea>

    <div class="lang-box">
        <span>Ngôn ngữ:</span>
        <span class="lang-badge" id="lang-label">Tiếng Việt (VN)</span>
    </div>

    <div class="controls">
        <button class="btn-play" onclick="speak()">▶ PHÁT ÂM THANH</button>
        <button class="btn-switch" onclick="toggleLanguage()">🔄 ĐỔI SANG TIẾNG ANH</button>
        <button class="btn-stop" onclick="stop()">⏹ DỪNG</button>
    </div>

    <div id="status">Trạng thái: Sẵn sàng</div>
</div>

<script>
    const synth = window.speechSynthesis;
    let lang = 'vi-VN';

    function toggleLanguage() {
        if (lang === 'vi-VN') {
            lang = 'en-US';
            document.getElementById('lang-label').innerText = "Tiếng Anh (US)";
            document.getElementById('lang-label').style.background = "#555";
            document.querySelector('.btn-switch').innerText = "🔄 ĐỔI SANG TIẾNG VIỆT";
        } else {
            lang = 'vi-VN';
            document.getElementById('lang-label').innerText = "Tiếng Việt (VN)";
            document.getElementById('lang-label').style.background = "#4a90e2";
            document.querySelector('.btn-switch').innerText = "🔄 ĐỔI SANG TIẾNG ANH";
        }
    }

    function speak() {
        const text = document.getElementById('text-input').value;
        if (!text.trim()) return alert("Vui lòng nhập văn bản!");

        synth.cancel(); // Dừng các lượt nói đang chờ

        const utter = new SpeechSynthesisUtterance(text);
        
        // Tìm voice phù hợp với ngôn ngữ đã chọn
        const voices = synth.getVoices();
        const selectedVoice = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
        
        if (selectedVoice) utter.voice = selectedVoice;
        utter.lang = lang;
        utter.rate = 1.0; 
        utter.pitch = 1.0;

        utter.onstart = () => document.getElementById('status').innerText = "Trạng thái: Đang phát...";
        utter.onend = () => document.getElementById('status').innerText = "Trạng thái: Hoàn thành.";

        synth.speak(utter);
    }

    function stop() {
        synth.cancel();
        document.getElementById('status').innerText = "Trạng thái: Đã dừng.";
    }

    // Load voices cho trình duyệt (cần thiết cho một số trình duyệt)
    window.speechSynthesis.onvoiceschanged = () => { synth.getVoices(); };
</script>

</body>
</html>
